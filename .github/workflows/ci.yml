name: CI Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Build (syntax check)
        run: python -m py_compile $(find src -name "*.py")
      - name: Run unit tests
        run: pytest tests/test_validators.py tests/test_models.py tests/test_services.py -v
      - name: Run integration tests
        run: pytest tests/test_integration.py -v
      - name: Coverage report
        run: pytest --cov=src --cov-report=term-missing --cov-report=xml --cov-report=html --cov-fail-under=60
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-html
          path: htmlcov/
